site_name: rag-project

nav:
  - Home: index.md
  - Introduction: introduction.md
  - About: about.md
  - Usage: setup.md
  - Architecture: architecture.md
  - Prompt Engineering: prompt_engineering.md

theme: material

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true 
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji

  
