prompt_path: "prompt.txt"

guardrails:
  min_question_length: 1
  max_question_length: 500
  max_response_length: 500

  banned_words:
    - damn
    - hell
    - crap
    - shit
    - fuck

  banned_topics:
    - health
    - finance
    - gambling
    - stock market
    - cryptocurrency
    - investing

  messages:
    banned_word: "Language, please. I'm in a Zen state. 🧘‍♀️"
    banned_topic: "Nice try 😏 but I’m not touching that topic with a yoga mat."

