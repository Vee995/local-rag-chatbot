# Prompt Configuration
# Folder where prompt templates are stored
prompt_folder: "prompt_engineering"

# Type of prompt template to use:
# options: basic, fewshot, cot (chain of thought) and chaining
prompt_type: "basic"

# Variables expected in prompt templates
prompt_variables:
  - context
  - question


# Language Model (LLM) Settings
llm:
  provider: "ollama"       # e.g., openai, huggingface, ollama
  model: "mistral"         # model name/version
  temperature: 0.7         # sampling temperature for creativity


chain:
  type: "stuff"  # options: stuff, map_reduce, refine, map_rerank


# Embedding Model Settings
embedding:
  model_name: "all-MiniLM-L6-v2"  # sentence transformer model for embeddings


# Vector Store Settings
vectorstore:
  persist_directory: "chroma_db"    # directory to save vector db
  collection_name: "default_collection"  # collection/table name for vectors


# Data Ingestion Settings
ingestion:
  data_dir: "data"                   # folder for input documents/files
  supported_filetypes: [".pdf", ".txt"]  # allowed file types


# Text Splitter Settings
splitter:
  chunk_size: 500           # max tokens per chunk
  chunk_overlap: 50         # overlap tokens between chunks


# Guardrails / Content Moderation
guardrails:
  min_question_length: 1     # minimum allowed question length
  max_question_length: 500   # maximum allowed question length
  max_response_length: 500   # max tokens in generated answer

  banned_words:
    - damn
    - stupid
    - crap
    - shit
    - fuck

  banned_topics:
    - health
    - finance
    - gambling
    - stock market
    - cryptocurrency
    - investing
    - hacking
    - legal

  messages:
    banned_word: 
      - "Wow. Did you crawl out from under a rock? Grow up and speak like a civilized human, or don’t speak at all."
      - "Your vocabulary is as limited as your life choices 🤡. Try again 🙄."
      - "Profanity isn’t a personality trait. Try harder 🥱."
      - "Tone it down before I start charging you for therapy sessions. Namaste!"
      - "Come back when your vocabulary isn’t stuck in middle school."
      - "If attitude was yoga poses, you’d be stuck in ‘desperate for attention.’ 🤸‍♂️😏"
    banned_topic:
      - "I’m a yoga bot, not your workaround for banned topics. Go bother someone else 🚫🧘‍♀️."
      - "That topic’s a no-go. I'm a bot for yoga, what about that don't you understand!"
      - "Sorry, my chakras ✨ can’t handle that mess of a topic."
      - "My chakras are too pure for your shady questions."
      - "Banned topic alert! Try yoga breathing instead of gambling with your brain."
      - "That topic’s off-limits. Come back when you’re ready to zen out 🕉️🧘‍♂️."


# Langsmith (Trace Logging) Settings
langsmith:
  enabled: false              # enable or disable trace logging
  project: "chakra-karen-chatbot-traces"   # project name for logs


# Logging Configuration
logging:
  level: "DEBUG"             # logging level (DEBUG, INFO, WARNING, ERROR)